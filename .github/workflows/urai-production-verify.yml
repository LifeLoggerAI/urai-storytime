name: URAI Storytime Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - name: Install root dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Install Functions dependencies
        run: |
          if [ -f functions/package-lock.json ]; then
            npm --prefix functions ci
          elif [ -f functions/package.json ]; then
            npm --prefix functions install
          else
            echo "No functions package found; skipping."
          fi
      - name: Verify
        run: node scripts/urai-production-verify.mjs
      - name: Write verification receipt
        if: always()
        run: |
          mkdir -p ci-receipts
          cat > ci-receipts/urai-storytime-verify.txt <<'EOF'
          URAI Storytime CI verification receipt
          Repository: ${{ github.repository }}
          Commit: ${{ github.sha }}
          Ref: ${{ github.ref }}
          Workflow: ${{ github.workflow }}
          Run ID: ${{ github.run_id }}
          Run number: ${{ github.run_number }}
          Actor: ${{ github.actor }}
          Verification command: node scripts/urai-production-verify.mjs
          Production boundary: this receipt proves CI command execution only; Firebase deploy, provider smoke, emulator behavior execution, live persistence, public share smoke, export artifacts, and safety/legal approvals still require separate receipts.
          EOF
      - name: Upload verification receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urai-storytime-verify-${{ github.sha }}
          path: ci-receipts/urai-storytime-verify.txt
          retention-days: 30

name: URAI Storytime Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - name: Install root dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Install Functions dependencies
        run: |
          if [ -f functions/package-lock.json ]; then
            npm --prefix functions ci
          elif [ -f functions/package.json ]; then
            npm --prefix functions install
          else
            echo "No functions package found; skipping."
          fi
      - name: Verify
        run: node scripts/urai-production-verify.mjs

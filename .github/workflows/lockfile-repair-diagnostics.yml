name: Lockfile Repair Diagnostics

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: storytime-lockfile-repair-${{ github.event.pull_request.number || github.ref }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  TARGET_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
  regenerate-lockfiles:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Prove exact clean candidate and missing locks
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"
          test ! -e package-lock.json
          test ! -e functions/package-lock.json

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'

      - name: Generate only root and Functions locks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/storytime-lock
          npm install --package-lock-only --ignore-scripts --no-audit 2>&1 | tee /tmp/storytime-lock/root-generate.log
          npm --prefix functions install --package-lock-only --ignore-scripts --no-audit 2>&1 | tee /tmp/storytime-lock/functions-generate.log
          changed="$({ git diff --name-only; git ls-files --others --exclude-standard; } | sort -u)"
          printf '%s\n' "$changed" | tee /tmp/storytime-lock/changed-paths.txt
          test "$changed" = $'functions/package-lock.json\npackage-lock.json'
          git diff --check

      - name: Prove generated locks are installable
        shell: bash
        run: |
          set -euo pipefail
          npm ci --no-audit 2>&1 | tee /tmp/storytime-lock/root-install.log
          npm --prefix functions ci --no-audit 2>&1 | tee /tmp/storytime-lock/functions-install.log

      - name: Run source suites
        shell: bash
        run: |
          set -uo pipefail
          status=0
          run_check() {
            local name="$1"
            shift
            "$@" 2>&1 | tee "/tmp/storytime-lock/${name}.log"
            local code=${PIPESTATUS[0]}
            if [ "$code" -ne 0 ]; then status=1; fi
          }
          run_check lint npm run lint
          run_check test npm test
          run_check smoke npm run test:smoke
          run_check security-rules npm run test:security-rules
          run_check emulator-scaffold npm run test:emulator-scaffold
          run_check emulator-runtime npm run test:emulator-runtime
          run_check production-readiness npm run test:production-readiness
          run_check build npm run build
          run_check functions-build npm --prefix functions run build
          printf '%s\n' "$status" > /tmp/storytime-lock/status.txt
          exit 0

      - name: Upload generated locks and diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: urai-storytime-lockfiles-${{ env.TARGET_SHA }}
          path: |
            package-lock.json
            functions/package-lock.json
            /tmp/storytime-lock/**
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce diagnostic result
        shell: bash
        run: |
          set -euo pipefail
          test -s package-lock.json
          test -s functions/package-lock.json
          test "$(cat /tmp/storytime-lock/status.txt)" = "0"

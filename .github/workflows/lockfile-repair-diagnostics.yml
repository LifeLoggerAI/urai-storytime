name: Apply Verified Lockfiles Once

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: storytime-verified-lock-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  TARGET_SHA: ${{ github.event.pull_request.head.sha }}
  HEAD_REF: ${{ github.event.pull_request.head.ref }}
  EXPECTED_SOURCE_SHA: 17f9581ac59f02383c55a5bcc12e8fc911702df3
  EXPECTED_ROOT_LOCK_SHA256: 29fd46b02f143ccca6623df1bd92cf6668d32cda710a5059cf84fed5a5da1c54
  EXPECTED_FUNCTIONS_LOCK_SHA256: b57974a5ffb09591ff1e6957268a860df9b927c5e77261dd3ccd5eac0f70246c

jobs:
  apply-verified-locks:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit/2026-07-06-production-truth'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout exact one-time apply head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0
          persist-credentials: true

      - name: Prove one-time authority and clean source ancestry
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/storytime-lock-apply
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          test "$(git merge-base "$EXPECTED_SOURCE_SHA" HEAD)" = "$EXPECTED_SOURCE_SHA"
          control_changes="$(git diff --name-only "$EXPECTED_SOURCE_SHA"..HEAD | sort)"
          printf '%s\n' "$control_changes" | tee /tmp/storytime-lock-apply/control-changes.txt
          test "$control_changes" = $'.github/workflows/lockfile-repair-diagnostics.yml\n.gitignore'
          test -z "$(git status --porcelain --untracked-files=all)"
          test ! -e package-lock.json
          test ! -e functions/package-lock.json
          test -f .github/workflows/lockfile-repair-diagnostics.yml

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'

      - name: Regenerate and bind exact verified lock bytes
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts --no-audit 2>&1 | tee /tmp/storytime-lock-apply/root-generate.log
          npm --prefix functions install --package-lock-only --ignore-scripts --no-audit 2>&1 | tee /tmp/storytime-lock-apply/functions-generate.log
          root_hash="$(sha256sum package-lock.json | awk '{print $1}')"
          functions_hash="$(sha256sum functions/package-lock.json | awk '{print $1}')"
          printf 'root=%s\nfunctions=%s\n' "$root_hash" "$functions_hash" | tee /tmp/storytime-lock-apply/hashes.txt
          test "$root_hash" = "$EXPECTED_ROOT_LOCK_SHA256"
          test "$functions_hash" = "$EXPECTED_FUNCTIONS_LOCK_SHA256"

      - name: Prove frozen installs and full source suite
        shell: bash
        run: |
          set -euo pipefail
          npm ci --no-audit 2>&1 | tee /tmp/storytime-lock-apply/root-install.log
          npm --prefix functions ci --no-audit 2>&1 | tee /tmp/storytime-lock-apply/functions-install.log
          npm run lint 2>&1 | tee /tmp/storytime-lock-apply/lint.log
          npm test 2>&1 | tee /tmp/storytime-lock-apply/test.log
          npm run test:smoke 2>&1 | tee /tmp/storytime-lock-apply/smoke.log
          npm run test:security-rules 2>&1 | tee /tmp/storytime-lock-apply/security-rules.log
          npm run test:emulator-scaffold 2>&1 | tee /tmp/storytime-lock-apply/emulator-scaffold.log
          npm run test:emulator-runtime 2>&1 | tee /tmp/storytime-lock-apply/emulator-runtime.log
          npm run test:production-readiness 2>&1 | tee /tmp/storytime-lock-apply/production-readiness.log
          npm run build 2>&1 | tee /tmp/storytime-lock-apply/build.log
          npm --prefix functions run build 2>&1 | tee /tmp/storytime-lock-apply/functions-build.log
          git status --porcelain=v1 --untracked-files=all | tee /tmp/storytime-lock-apply/precommit-status.txt

      - name: Prove deterministic Next-generated configuration
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' | tee /tmp/storytime-lock-apply/next-generated-config.json
          const assert = require('node:assert/strict');
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');

          const target = process.env.TARGET_SHA;
          const before = JSON.parse(execFileSync('git', ['show', `${target}:tsconfig.json`], { encoding: 'utf8' }));
          const after = JSON.parse(fs.readFileSync('tsconfig.json', 'utf8'));
          const plugins = after?.compilerOptions?.plugins;
          assert.deepEqual(plugins, [{ name: 'next' }], 'Next must add exactly one compiler plugin');

          const normalizedAfter = structuredClone(after);
          delete normalizedAfter.compilerOptions.plugins;
          assert.deepEqual(normalizedAfter, before, 'Next may not change any tsconfig semantics except the next plugin');

          const nextEnvLines = fs.readFileSync('next-env.d.ts', 'utf8').trimEnd().split(/\r?\n/);
          assert.equal(nextEnvLines[0], '/// <reference types="next" />');
          assert.equal(nextEnvLines[1], '/// <reference types="next/image-types/global" />');
          assert.ok(nextEnvLines.some((line) => line.includes('This file should not be edited')));

          const changed = execFileSync('git', ['diff', '--name-only'], { encoding: 'utf8' })
            .trim()
            .split(/\r?\n/)
            .filter(Boolean)
            .sort();
          assert.deepEqual(changed, ['next-env.d.ts', 'tsconfig.json']);

          console.log(JSON.stringify({ plugins, changed, nextEnvLines }, null, 2));
          NODE

      - name: Create exact self-cleaning lock commit
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/lockfile-repair-diagnostics.yml
          git add package-lock.json functions/package-lock.json next-env.d.ts tsconfig.json
          git status --short | tee /tmp/storytime-lock-apply/staged-status.txt
          git diff --cached --name-status | tee /tmp/storytime-lock-apply/staged-name-status.txt
          staged="$(git diff --cached --name-only | sort)"
          printf '%s\n' "$staged" | tee /tmp/storytime-lock-apply/staged-paths.txt
          test "$staged" = $'.github/workflows/lockfile-repair-diagnostics.yml\nfunctions/package-lock.json\nnext-env.d.ts\npackage-lock.json\ntsconfig.json'
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Lock Storytime dependency graph and deterministic Next config' 2>&1 | tee /tmp/storytime-lock-apply/commit.log
          final_sha="$(git rev-parse HEAD)"
          cat > /tmp/storytime-lock-apply/receipt.txt <<EOF
          Storytime verified lock apply receipt
          Repository: ${GITHUB_REPOSITORY}
          Validated source: ${EXPECTED_SOURCE_SHA}
          One-time apply head: ${TARGET_SHA}
          Final local commit: ${final_sha}
          Root lock SHA-256: ${EXPECTED_ROOT_LOCK_SHA256}
          Functions lock SHA-256: ${EXPECTED_FUNCTIONS_LOCK_SHA256}
          Changed paths: package-lock.json, functions/package-lock.json, deterministic next-env.d.ts and tsconfig.json, deleted temporary workflow
          Provider calls: 0
          Deployment: false
          Production data mutation: false
          EOF
          git status --porcelain=v1 --untracked-files=all | tee /tmp/storytime-lock-apply/postcommit-status.txt
          test ! -s /tmp/storytime-lock-apply/postcommit-status.txt

      - name: Upload immutable apply evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: urai-storytime-lock-apply-${{ env.TARGET_SHA }}
          path: /tmp/storytime-lock-apply/**
          if-no-files-found: error
          retention-days: 90

      - name: Push exact verified lock commit
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "$TARGET_SHA"
          git push origin "HEAD:${HEAD_REF}"

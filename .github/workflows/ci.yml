name: URAI Storytime CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'implementation/**'
      - 'storytime-*'

permissions:
  contents: read

jobs:
  verify:
    name: Verify app install, tests, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Smoke tests
        run: npm run test:smoke

      - name: Deployment readiness scaffold check
        run: npm run test:deployment

      - name: Security rules static validation
        run: npm run test:security-rules

      - name: Emulator scaffold validation
        run: npm run test:emulator-scaffold

      - name: Emulator runtime validation
        run: npm run test:emulator-runtime

      - name: Production readiness validation
        run: npm run test:production-readiness

      - name: Production build
        run: npm run build

  functions:
    name: Verify Firebase Functions build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install function dependencies
        working-directory: functions
        run: npm install

      - name: Build functions
        working-directory: functions
        run: npm run build

  production-gates:
    name: Verify production-only evidence gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Provider wiring validation
        run: npm run test:provider-wiring

      - name: Production evidence validation
        run: npm run test:production-evidence

      - name: Production smoke validation
        run: npm run test:production-smoke

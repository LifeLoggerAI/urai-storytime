name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app:
    name: App build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install app dependencies
        run: npm install

      - name: Typecheck app
        run: npm run typecheck

      - name: Build app
        run: npm run build

      - name: Test app
        run: npm test

  functions:
    name: Functions build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install function dependencies
        working-directory: functions
        run: npm install

      - name: Build functions
        working-directory: functions
        run: npm run build

name: URAI Storytime CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'implementation/**'

permissions:
  contents: read

jobs:
  verify:
    name: Verify install, lint, typecheck, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Smoke tests
        run: npm run test:smoke

      - name: E2E tests
        run: npm run test:e2e

      - name: Deployment readiness scaffold check
        run: npm run test:deployment

      - name: Production build
        run: npm run build

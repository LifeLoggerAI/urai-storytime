name: URAI Storytime CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'implementation/**'

permissions:
  contents: read

jobs:
  verify:
    name: Verify install, lint, typecheck, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Smoke tests
        run: npm run test:smoke

      - name: E2E tests
        run: npm run test:e2e

      - name: Deployment readiness scaffold check
        run: npm run test:deployment

      - name: Security rules static validation
        run: npm run test:security-rules

      - name: Emulator scaffold validation
        run: npm run test:emulator-scaffold

      - name: Production readiness validation
        run: npm run test:production-readiness

      - name: Production build
        run: npm run build

  production-gates:
    name: Verify production-only evidence gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Provider wiring validation
        run: npm run test:provider-wiring

      - name: Production evidence validation
        run: npm run test:production-evidence

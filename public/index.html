<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storytime V2</title>
    <script src="/__/firebase/9.6.1/firebase-app-compat.js"></script>
    <script src="/__/firebase/9.6.1/firebase-auth-compat.js"></script>
    <script src="/__/firebase/9.6.1/firebase-firestore-compat.js"></script>
    <script src="/__/firebase/9.6.1/firebase-functions-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
    <style>
        /* ... existing styles ... */
        .danger-button { background-color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <!-- ... existing auth and family containers ... -->

    <div id="story-container" class="hidden">
        <h2>2. Manage & Generate</h2>
        <p>Family ID: <span id="familyIdDisplay"></span></p>
        
        <label for="child-select">Choose a child:</label>
        <select id="child-select"></select>
        <button id="viewHistoryButton">View History</button>
        <button id="deleteChildButton" class="danger-button">Delete Child</button>

        <br><br>
        <label for="mode-select">Choose a mode:</label>
        <select id="mode-select">
            <option value="day">Day</option>
            <option value="night">Night</option>
        </select>
        <br><br>
        <button id="generateStoryButton">Get Story</button>
    </div>

    <!-- ... other containers: history, player, expansion ... -->
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // ... existing setup: auth, functions, db, ui elements ...
        const deleteChildButton = document.getElementById('deleteChildButton');
        const deleteChildDataFunc = functions.httpsCallable('deleteChildData');

        // ... existing listeners for signIn, createFamily, etc. ...

        deleteChildButton.onclick = async () => {
            const childId = ui.childSelect.value;
            const childName = ui.childSelect.options[ui.childSelect.selectedIndex].text;
            if (!childId) return showError("Please select a child to delete.");

            if (confirm(`Are you sure you want to delete all data for ${childName}? This cannot be undone.`)) {
                try {
                    const result = await deleteChildDataFunc({ familyId, childId });
                    if (result.data.success) {
                        showResponse(`All data for ${childName} has been deleted.`);
                        await fetchAndPopulateChildren(familyId);
                    } else {
                        showError(result.data.error || 'Failed to delete child data.');
                    }
                } catch (err) { showError(err.message); }
            }
        };

        // ... rest of the script ...
    });
</script>

</body>
</html>
